<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoundrel Balatro Prototype</title>
<style>
    body { font-family: monospace; background-color: #1e1e2e; color: #cdd6f4; margin: 20px; text-align: center; }
    .stats-bar { display: flex; justify-content: space-around; background: #313244; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 1.2rem; }
    .stat { display: flex; flex-direction: column; }
    .label { font-size: 0.8rem; color: #a6adc8; text-transform: uppercase; }
    #room { display: flex; justify-content: center; gap: 15px; margin: 40px 0; min-height: 144px; }
    .card { width: 100px; height: 140px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #000000; background: #ffffff; border: 2px solid #ccc; cursor: pointer; border: 2px solid transparent; transition: 0.2s; user-select: none; }
    .card:hover { transform: translateY(-5px); border-color: #cba6f7; }
    
    
    
    .card.hidden { visibility: hidden; pointer-events: none; }
    #controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    button { padding: 10px 20px; font-size: 1rem; background: #cba6f7; color: #000000; background: #ffffff; border: 2px solid #ccc; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; font-weight: bold; }
    button:hover { background: #b4befe; }
    button:disabled { background: #45475a; cursor: not-allowed; color: #6c7086; }
    #log { margin-top: 30px; background: #181825; padding: 10px; border-radius: 8px; height: 200px; overflow-y: auto; text-align: left; font-size: 0.9rem; color: #a6adc8; display: flex; flex-direction: column-reverse; }
    .card { position: relative; }
    .actions { display: none; position: absolute; bottom: 5px; left: 0; right: 0; flex-direction: column; gap: 5px; padding: 0 5px; }
    .card:hover .actions { display: flex; }
    .act-btn { padding: 5px; font-size: 0.8rem; width: 100%; border-radius: 3px; cursor: pointer; border: none; font-weight: bold; }
    .weapon-btn { background: #f9e2af; color: #000000; background: #ffffff; border: 2px solid #ccc; }
    .fist-btn { background: #f38ba8; color: #000000; background: #ffffff; border: 2px solid #ccc; }
    .act-btn:hover { filter: brightness(1.2); }

    .tooltip { position: relative; cursor: help; }
    .tooltip .tooltiptext { visibility: hidden; width: 220px; background-color: #181825; color: #cdd6f4; text-align: left; border-radius: 6px; padding: 10px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; border: 1px solid #cba6f7; font-size: 0.8rem; font-weight: normal; line-height: 1.4; }
    .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
</style>
</head>
<body>

    <h1>Scoundrel Balatro: Grey-Box Prototype</h1>
    
    <div id="game-screen">
    <div id="top-stats" class="stats-bar">
        <div class="stat"><span class="label">Target Score</span><span id="target">5000</span></div>
        <div class="stat"><span class="label">Score</span><span id="score">0</span></div>
        <div class="stat"><span class="label">Multiplier</span><span id="mult">1x</span></div>
        <div class="stat"><span class="label">Gold</span><span id="gold">0</span></div>
        <div class="stat"><span class="label">Deck</span><span id="deck-count">44</span></div>
    </div>

    <h2>Current Room</h2>
    <div id="room"></div>

    <div id="controls">
        <button id="btn-flee" onclick="fleeRoom()">Flee Room</button>
        <button id="btn-next" onclick="drawRoom()" disabled>Next Room</button>
        <button id="btn-restart" onclick="initGame()">Restart</button>
    </div>

    <div id="bottom-stats" class="stats-bar" style="margin-top: 40px; margin-bottom: 0;">
        <div class="stat"><span class="label">Weapon</span><span id="weapon">None</span></div>
        <div class="stat"><span class="label">Item</span><span id="item">None</span></div>
        <div class="stat"><span class="label">Talismans</span><span id="talismans-ui">0/4</span></div>
        <div class="stat"><span class="label">HP</span><span id="hp">20 / 20</span></div>
    </div>
    </div>

    
    <div id="shop-screen" style="display:none; background: #181825; border: 2px solid #cba6f7; border-radius: 8px; padding: 20px; margin-bottom: 20px; margin-top: 20px;">
        <h2 style="margin-top: 0; color: #f9e2af;">Scoundrel Shop</h2>
        <div style="margin-bottom: 20px; font-size: 1.2rem;">Gold: <span id="shop-gold" style="color: #f9e2af; font-weight: bold;">0</span></div>
        <div id="shop-items" style="display:flex; justify-content:center; gap: 20px; margin-bottom:20px; flex-wrap: wrap;"></div>
        <button onclick="openSellMenu()" style="background: #f38ba8; margin-right: 15px;">Sell Talismans</button>
        <button onclick="closeShop()" style="background: #a6e3a1;">Next Chamber</button>
    </div>
    
    <div id="log"></div>

    <script src="game.js"></script>

    <div id="sell-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
        <div style="background:#1e1e2e; padding:20px; border-radius:8px; border:2px solid #f38ba8; max-width:800px; width:90%; text-align:center;">
            <h2 style="margin-top:0; color:#f38ba8;">Sell Talismans</h2>
            <p style="color:#a6adc8; margin-bottom:20px;">Click a Talisman to sell it for 5 Gold.</p>
            <div id="sell-items" style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-bottom:20px;"></div>
            <button onclick="closeSellMenu()" style="background:#a6adc8;">Close</button>
        </div>
    </div>
</body>
</html>
